<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente | Racing Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Racing Sans One', sans-serif;
            background: #121212; color: white; display: flex;
            justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .form-card {
            background: #1e1e1e; padding: 40px; border-radius: 10px;
            border-left: 5px solid #e63946; width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #e63946; text-transform: uppercase; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #333; border: none; color: white; border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%; background: #e63946; color: white; border: none;
            padding: 15px; border-radius: 5px; cursor: pointer; font-family: 'Racing Sans One';
            font-size: 1.1rem; margin-top: 20px; transition: 0.3s;
        }
        button:hover { background: #ff4d5a; transform: scale(1.02); }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Novo Cliente</h2>
        <form action="/clientes/salvar" method="post">
            <input type="text" name="nome" placeholder="NOME COMPLETO" required>
            <input type="text" name="cpf" placeholder="CPF" required>
            <input type="text" name="rg" placeholder="RG">
            <input type="text" name="endereco" placeholder="ENDEREÇO">
            <input type="text" name="profissao" placeholder="PROFISSÃO">
            <input type="number" step="0.01" name="rendimento" placeholder="RENDIMENTO MENSAL">
            <button type="submit">FINALIZAR CADASTRO</button>
        </form>
    </div>
</body>
</html>
