<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Locadora Central | Racing Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Racing Sans One', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1920');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex; justify-content: center; align-items: center; color: white;
        }
        .card {
            background: rgba(0, 0, 0, 0.85);
            padding: 50px; border-radius: 20px; text-align: center;
            border: 2px solid #e63946; box-shadow: 0 10px 50px rgba(0,0,0,0.5);
        }
        h1 { font-size: 4rem; color: #e63946; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        p { font-size: 1.2rem; margin-bottom: 40px; color: #ddd; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        .btn {
            background: #e63946; color: white; padding: 15px 40px;
            text-decoration: none; border-radius: 5px; font-size: 1.3rem;
            transition: 0.3s; border: 1px solid transparent;
        }
        .btn:hover { background: white; color: #e63946; transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="card">
        <h1>LOCADORA CENTRAL</h1>
        <p>LABORATÓRIO DE SOFTWARE - SPRINT 04</p>
        <div class="btn-group">
            <a href="/clientes/novo" class="btn">GESTÃO DE CLIENTES</a>
            <a href="/carros/novo" class="btn">FROTA DE VEÍCULOS</a>
            <a href="/pedidos/novo" class="btn" style="background:none; border-color:white;">REALIZAR ALUGUEL</a>
        </div>
    </div>
</body>
</html>
