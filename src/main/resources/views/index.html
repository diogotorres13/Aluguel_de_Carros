<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Locadora Racing | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Racing Sans One', sans-serif;
            background: #121212;
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
        }

        .container {
            text-align: center;
            background: rgba(30, 30, 30, 0.9);
            padding: 50px;
            border-radius: 15px;
            border-top: 5px solid #e63946;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
        }

        h1 {
            font-size: 3.5rem;
            color: #e63946;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            color: #ccc;
            margin-bottom: 40px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .btn {
            display: block;
            background: #333;
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            transition: 0.3s;
            border: 1px solid #444;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #e63946;
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4);
        }

        .btn-highlight {
            background: #e63946;
            grid-column: span 2; /* Ocupa as duas colunas */
        }

        .btn-highlight:hover {
            background: #ff4d5a;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Locadora Racing</h1>
        <p>Sistema de Gestão de Aluguer de Automóveis</p>

        <div class="menu-grid">
            <a href="/clientes/novo" class="btn">Gestão de Clientes</a>
            
            <a href="/carros/novo" class="btn">Frota de Veículos</a>

            <a href="/pedidos/novo" class="btn btn-highlight">Realizar Novo Aluguer</a>

            <a href="/pedidos/listar" class="btn btn-highlight">Painel de Controlo (Consultar e Avaliar)</a>
        </div>
    </div>

</body>
</html>
