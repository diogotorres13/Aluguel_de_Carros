<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente | Racing Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Racing Sans One', sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .form-card { background: #1e1e1e; padding: 30px; border-radius: 10px; border-left: 5px solid #e63946; width: 500px; }
        h2 { color: #e63946; text-transform: uppercase; margin-top: 0; }
        h4 { color: #888; margin: 15px 0 5px 0; border-bottom: 1px solid #333; }
        input { width: 100%; padding: 10px; margin: 8px 0; background: #333; border: none; color: white; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; background: #e63946; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-family: 'Racing Sans One'; font-size: 1.1rem; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Novo Cliente</h2>
        <form action="/clientes/salvar" method="post">
            <input type="text" name="nome" placeholder="NOME COMPLETO" required>
            <input type="text" name="cpf" placeholder="CPF" required>
            <input type="text" name="rg" placeholder="RG">
            <input type="text" name="endereco" placeholder="ENDEREÇO">
            
            <h4>Rendimento 1</h4>
            <input type="text" name="empresa1" placeholder="EMPRESA">
            <input type="number" step="0.01" name="rendimento1" placeholder="VALOR">

            <h4>Rendimento 2</h4>
            <input type="text" name="empresa2" placeholder="EMPRESA">
            <input type="number" step="0.01" name="rendimento2" placeholder="VALOR">

            <h4>Rendimento 3</h4>
            <input type="text" name="empresa3" placeholder="EMPRESA">
            <input type="number" step="0.01" name="rendimento3" placeholder="VALOR">

            <button type="submit">FINALIZAR CADASTRO</button>
        </form>
    </div>
</body>
</html>
