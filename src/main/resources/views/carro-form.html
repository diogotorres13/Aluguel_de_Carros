<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Veículo | Racing Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Racing Sans One', sans-serif;
            background: #121212; color: white; display: flex;
            justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .form-card {
            background: #1e1e1e; padding: 40px; border-radius: 10px;
            border-left: 5px solid #e63946; width: 400px;
        }
        h2 { color: #e63946; text-transform: uppercase; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #333; border: none; color: white; border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%; background: #e63946; color: white; border: none;
            padding: 15px; border-radius: 5px; cursor: pointer; font-family: 'Racing Sans One';
            font-size: 1.1rem; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Novo Veículo</h2>
        <form action="/carros/salvar" method="post">
            <input type="text" name="matricula" placeholder="MATRÍCULA INTERNA" required>
            <input type="text" name="placa" placeholder="PLACA DO VEÍCULO" required>
            <input type="text" name="marca" placeholder="MARCA (Ex: Ford)">
            <input type="text" name="modelo" placeholder="MODELO (Ex: Mustang)">
            <input type="number" name="ano" placeholder="ANO">
            <button type="submit">CADASTRAR CARRO</button>
        </form>
    </div>
</body>
</html>
