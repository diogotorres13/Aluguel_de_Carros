<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Realizar Aluguel | Racing Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Racing Sans One', sans-serif;
            background: #121212; color: white; display: flex;
            justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .form-card {
            background: #1e1e1e; padding: 40px; border-radius: 10px;
            border-left: 5px solid #e63946; width: 450px;
        }
        h2 { color: #e63946; text-transform: uppercase; margin-bottom: 25px; }
        select, input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: #333; border: none; color: white; border-radius: 5px;
        }
        label { color: #888; font-size: 0.9rem; }
        button {
            width: 100%; background: #e63946; color: white; border: none;
            padding: 15px; border-radius: 5px; cursor: pointer;
            font-family: 'Racing Sans One'; font-size: 1.2rem; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>Novo Aluguel</h2>
        <form action="/pedidos/salvar" method="post">
            <label>Selecione o Cliente:</label>
            <select name="cliente.id">
                <option th:each="c : ${clientes}" th:value="${c.id}" th:text="${c.nome}"></option>
            </select>

            <label>Selecione o Veículo:</label>
            <select name="carro.id">
                <option th:each="v : ${carros}" th:value="${v.id}" th:text="${v.modelo + ' - ' + v.placa}"></option>
            </select>

            <label>Data de Início:</label>
            <input type="date" name="dataInicio">
            
            <label>Data de Devolução:</label>
            <input type="date" name="dataFim">

            <input type="number" step="0.01" name="valorTotal" placeholder="VALOR TOTAL (R$)">
            
            <button type="submit">CONFIRMAR RESERVA</button>
        </form>
    </div>
</body>
</html>
