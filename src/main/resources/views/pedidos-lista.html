<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel de Avaliação | Racing Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Racing+Sans+One&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Racing Sans One', sans-serif; background: #0b0b0b; color: white; padding: 40px; margin: 0; }
        h2 { color: #e63946; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #e63946; padding-bottom: 10px; display: inline-block; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: #161616; border-radius: 8px; overflow: hidden; }
        th { background: #e63946; color: white; text-transform: uppercase; padding: 15px; text-align: left; font-size: 0.9rem; }
        td { padding: 15px; border-bottom: 1px solid #222; font-family: sans-serif; font-weight: bold; font-style: italic; }
        
        /* Badges de Status */
        .status-badge { padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; text-transform: uppercase; font-family: 'Racing Sans One'; }
        .pendente { background: #f1c40f; color: #000; }
        .aprovado { background: #2ecc71; color: #fff; }
        .cancelado { background: #e63946; color: #fff; }

        /* Select e Botão Estilizados */
        .select-racing { background: #222; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; font-family: 'Racing Sans One'; cursor: pointer; }
        .btn-ok { background: #e63946; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-family: 'Racing Sans One'; transition: 0.3s; }
        .btn-ok:hover { background: #ff4d5a; transform: scale(1.05); }
        .back-link { display: block; margin-top: 30px; color: #666; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: #e63946; }
    </style>
</head>
<body>
    <h2>Painel de Avaliação de Pedidos</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Cliente</th>
                <th>Veículo</th>
                <th>Status</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pedidos}">
                <td th:text="${p.id}" style="color: #e63946;"></td>
                <td th:text="${p.cliente.nome}"></td>
                <td th:text="${p.carro.marca + ' ' + p.carro.modelo}"></td>
                <td>
                    <span th:text="${p.status}" th:class="'status-badge ' + ${#strings.toLowerCase(p.status)}"></span>
                </td>
                <td>
                    <form action="/pedidos/avaliar" method="post" style="display: flex; gap: 8px;">
                        <input type="hidden" name="id" th:value="${p.id}">
                        <select name="novoStatus" class="select-racing" required>
                            <option value="" disabled selected>Avaliar...</option>
                            <option value="APROVADO">Aprovar</option>
                            <option value="CANCELADO">Cancelar</option>
                        </select>
                        <button type="submit" class="btn-ok">OK</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <a href="/" class="back-link">← Voltar para Home</a>
</body>
</html>
